name: Task-002 Validation

on:
  workflow_dispatch:
  push:
    paths:
      - "src/mainwindow.cpp"
      - "src/mainwindow.h"
      - "src/utils/sessionscanner.cpp"
      - "src/utils/sessionscanner.h"
      - "src/utils/remotesessionscanner.cpp"
      - "src/utils/remotesessionscanner.h"
      - "tests/task_001_remote_monitor_session_test.sh"
      - "tests/task_002_*.sh"
      - "tests/min_font_size_test.sh"
      - "CMakeLists.txt"

jobs:
  guard-and-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jurplel/install-qt-action@v5
        with:
          version: "6.10.0"
          cache: true

      - name: Guard suite
        run: bash tests/task_002_validation_guard_suite.sh

      - name: Build suite
        run: bash tests/task_002_validation_build_suite.sh
