name: Cross Build and Publish to Gitee

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, e.g. v1.0.0"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            arch: arm64
            runs_on: macos-14
            archive_name: ObsidianManager-macos-arm64.zip
          - os: macos
            arch: x64
            runs_on: macos-13
            archive_name: ObsidianManager-macos-x64.zip
          - os: linux
            arch: x64
            runs_on: ubuntu-latest
            archive_name: ObsidianManager-linux-x64.tar.gz
          - os: linux
            arch: arm64
            runs_on: ubuntu-24.04-arm
            archive_name: ObsidianManager-linux-arm64.tar.gz
          - os: windows
            arch: x64
            runs_on: windows-latest
            archive_name: ObsidianManager-windows-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          modules: 'qttools'
          cache: true

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p out
          ditto -c -k --sequesterRsrc --keepParent "build/ObsidianManager.app" "out/${{ matrix.archive_name }}"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p out
          tar -czf "out/${{ matrix.archive_name }}" -C build ObsidianManager

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Compress-Archive -Path build/Release/ObsidianManager.exe -DestinationPath out/${{ matrix.archive_name }} -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: out/${{ matrix.archive_name }}
          if-no-files-found: error

  publish-gitee:
    name: Publish release to Gitee
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create Gitee release and upload assets
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
          RELEASE_TAG: ${{ inputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GITEE_TOKEN:-}" ]; then
            echo "Missing secret: GITEE_TOKEN"
            exit 1
          fi

          OWNER="${GITEE_OWNER:-silentbalanceyh}"
          REPO="${GITEE_REPO:-r2mo-obsidian}"
          API_BASE="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"

          BODY="Automated cross-platform release ${RELEASE_TAG} built from ${COMMIT_SHA}."

          TAG_LOOKUP_CODE=$(curl -sS -o /tmp/gitee_release_get.json -w "%{http_code}" \
            "${API_BASE}/releases/tags/${RELEASE_TAG}?access_token=${GITEE_TOKEN}")

          RELEASE_ID=""
          if [ "${TAG_LOOKUP_CODE}" = "200" ]; then
            RELEASE_ID=$(python3 - <<'PY'
import json
with open('/tmp/gitee_release_get.json', 'r', encoding='utf-8') as f:
    resp = json.load(f)
print(resp.get('id', ''))
PY
            )
          else
            CREATE_RESP=$(curl -fsS -X POST "${API_BASE}/releases" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "tag_name=${RELEASE_TAG}" \
              -F "target_commitish=${COMMIT_SHA}" \
              -F "name=${RELEASE_TAG}" \
              -F "body=${BODY}" \
              -F "prerelease=false")

            RELEASE_ID=$(printf "%s" "${CREATE_RESP}" | python3 - <<'PY'
import json, sys
resp = json.loads(sys.stdin.read())
print(resp.get('id', ''))
PY
            )
          fi

          if [ -z "${RELEASE_ID}" ]; then
            echo "Failed to create release on Gitee"
            [ -f /tmp/gitee_release_get.json ] && cat /tmp/gitee_release_get.json || true
            exit 1
          fi

          shopt -s nullglob
          FILES=(dist/*)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No release artifacts found in dist/"
            exit 1
          fi

          for file in "${FILES[@]}"; do
            filename=$(basename "${file}")
            echo "Uploading ${filename}..."
            curl -fsS -X POST "${API_BASE}/releases/${RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "name=${filename}" \
              -F "file=@${file}" >/dev/null
          done

          echo "Gitee release published: ${RELEASE_TAG}"
