name: Release Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "release version"
        required: true
        type: string
  push:
    tags:
      - "release-*"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Print context
        run: |
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "version_input=${{ github.event.inputs.version }}"
