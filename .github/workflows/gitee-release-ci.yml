name: Gitee Release CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, e.g. v1.0.0"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            runs_on: macos-14
            archive: ObsidianManager-macos-arm64.zip
          - label: macos-x64
            runs_on: macos-13
            archive: ObsidianManager-macos-x64.zip
          - label: linux-x64
            runs_on: ubuntu-latest
            archive: ObsidianManager-linux-x64.tar.gz
          - label: windows-x64
            runs_on: windows-latest
            archive: ObsidianManager-windows-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          modules: 'qttools'
          cache: true

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p out
          ditto -c -k --sequesterRsrc --keepParent build/ObsidianManager.app out/${{ matrix.archive }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p out
          tar -czf out/${{ matrix.archive }} -C build ObsidianManager

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Compress-Archive -Path build/Release/ObsidianManager.exe -DestinationPath out/${{ matrix.archive }} -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: out/${{ matrix.archive }}

  publish:
    name: Publish to Gitee release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
          RELEASE_TAG: ${{ inputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          OWNER="${GITEE_OWNER:-silentbalanceyh}"
          REPO="${GITEE_REPO:-r2mo-obsidian}"
          API="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"

          if [ -z "${GITEE_TOKEN:-}" ]; then
            echo "Missing GITEE_TOKEN"
            exit 1
          fi

          CODE=$(curl -sS -o /tmp/release.json -w "%{http_code}" "${API}/releases/tags/${RELEASE_TAG}?access_token=${GITEE_TOKEN}")
          if [ "$CODE" = "200" ]; then
            RELEASE_ID=$(python3 -c "import json;print(json.load(open('/tmp/release.json')).get('id',''))")
          else
            RESP=$(curl -fsS -X POST "${API}/releases" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "tag_name=${RELEASE_TAG}" \
              -F "target_commitish=${COMMIT_SHA}" \
              -F "name=${RELEASE_TAG}" \
              -F "body=Automated build ${RELEASE_TAG}" \
              -F "prerelease=false")
            export RESP
            RELEASE_ID=$(python3 -c "import json,os;print(json.loads(os.environ['RESP']).get('id',''))")
          fi

          [ -n "$RELEASE_ID" ] || { echo "Release ID missing"; exit 1; }

          for f in dist/*; do
            [ -f "$f" ] || continue
            n=$(basename "$f")
            curl -fsS -X POST "${API}/releases/${RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "name=${n}" \
              -F "file=@${f}" >/dev/null
            echo "Uploaded ${n}"
          done
