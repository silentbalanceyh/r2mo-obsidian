name: Gitee Release CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, e.g. v1.0.0"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            runs_on: macos-14
            archive: ObsidianManager-macos-arm64.zip
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=arm64
          - label: macos-x64
            runs_on: macos-14
            archive: ObsidianManager-macos-x64.zip
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=x86_64
          - label: linux-x64
            runs_on: ubuntu-latest
            archive: ObsidianManager-linux-x64.tar.gz
            cmake_args:
          - label: linux-arm64
            runs_on: ubuntu-24.04-arm
            archive: ObsidianManager-linux-arm64.tar.gz
            cmake_args:
          - label: windows-x64
            runs_on: windows-latest
            archive: ObsidianManager-windows-x64.zip
            cmake_args:

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          cache: true

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TRANSLATIONS=OFF ${{ matrix.cmake_args }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TRANSLATIONS=OFF ${{ matrix.cmake_args }}

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p out
          ditto -c -k --sequesterRsrc --keepParent build/ObsidianManager.app out/${{ matrix.archive }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p out
          tar -czf out/${{ matrix.archive }} -C build ObsidianManager

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Compress-Archive -Path build/Release/ObsidianManager.exe -DestinationPath out/${{ matrix.archive }} -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.label }}
          path: out/${{ matrix.archive }}

  publish:
    name: Publish to Gitee release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
          RELEASE_TAG: ${{ inputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          OWNER="${GITEE_OWNER:-silentbalanceyh}"
          REPO="${GITEE_REPO:-r2mo-obsidian}"
          API="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"

          if [ -z "${GITEE_TOKEN:-}" ]; then
            echo "Missing GITEE_TOKEN"
            exit 1
          fi

          RELEASE_ID=""

          echo "Checking Gitee release ${RELEASE_TAG}"
          CODE=$(curl -sS -o /tmp/release.json -w "%{http_code}" \
            --connect-timeout 20 --max-time 60 --retry 2 --retry-delay 5 \
            "${API}/releases/tags/${RELEASE_TAG}?access_token=${GITEE_TOKEN}")
          echo "Release lookup HTTP ${CODE}"
          if [ "$CODE" = "200" ]; then
            RELEASE_ID=$(python3 -c "import json;d=json.load(open('/tmp/release.json'));print(d.get('id','') if isinstance(d,dict) else '')" 2>/dev/null || true)
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "Creating Gitee release ${RELEASE_TAG}"
            CREATE_CODE=$(curl -sS -o /tmp/create_release.json -w "%{http_code}" -X POST "${API}/releases" \
              --connect-timeout 20 --max-time 120 --retry 2 --retry-delay 5 \
              -F "access_token=${GITEE_TOKEN}" \
              -F "tag_name=${RELEASE_TAG}" \
              -F "target_commitish=${COMMIT_SHA}" \
              -F "name=${RELEASE_TAG}" \
              -F "body=Automated build ${RELEASE_TAG}" \
              -F "prerelease=false")

            if [ "$CREATE_CODE" != "201" ] && [ "$CREATE_CODE" != "200" ]; then
              echo "Create release failed: HTTP ${CREATE_CODE}"
              cat /tmp/create_release.json
              exit 1
            fi

            RELEASE_ID=$(python3 -c "import json;d=json.load(open('/tmp/create_release.json'));print(d.get('id','') if isinstance(d,dict) else '')" 2>/dev/null || true)
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "Release ID missing"
            echo "get release response:"
            cat /tmp/release.json || true
            echo "create release response:"
            cat /tmp/create_release.json || true
            exit 1
          fi

          echo "Gitee release id: ${RELEASE_ID}"
          for f in dist/*; do
            [ -f "$f" ] || continue
            n=$(basename "$f")
            echo "Uploading ${n}"
            if curl -fsS -X POST "${API}/releases/${RELEASE_ID}/attach_files" \
              --connect-timeout 20 --max-time 180 --retry 2 --retry-delay 5 \
              -F "access_token=${GITEE_TOKEN}" \
              -F "name=${n}" \
              -F "file=@${f}" >/dev/null; then
              echo "Uploaded ${n}"
            else
              echo "Skip/exists/fail: ${n}"
            fi
          done
